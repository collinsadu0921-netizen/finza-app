name: Accounting Invariant Checks

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      business_id:
        description: 'Business ID to audit (optional, uses default from env if not provided)'
        required: false
        type: string

env:
  NODE_VERSION: '20.x'

jobs:
  accounting-invariant-audit:
    name: Run Accounting Invariant Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install ts-node
        run: npm install --save-dev ts-node @types/node typescript

      - name: Run accounting invariant audit
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BUSINESS_ID: ${{ github.event.inputs.business_id || secrets.CI_TEST_BUSINESS_ID }}
          LIMIT_PERIODS: 3
        run: npx ts-node scripts/accounting-ci-audit.ts
        continue-on-error: false

      - name: Report bypass detection
        run: npx ts-node scripts/detect-report-bypass.ts
        continue-on-error: false

      - name: Detect non-ledger report aggregations
        run: npx ts-node scripts/detect-non-ledger-reports.ts
        continue-on-error: false

  summary:
    name: Audit Summary
    runs-on: ubuntu-latest
    needs: accounting-invariant-audit
    if: always()
    steps:
      - name: Check audit results
        run: |
          if [ "${{ needs.accounting-invariant-audit.result }}" != "success" ]; then
            echo "❌ Accounting invariant audit failed"
            echo "Review the logs above for details"
            exit 1
          else
            echo "✅ Accounting invariant audit passed"
          fi
