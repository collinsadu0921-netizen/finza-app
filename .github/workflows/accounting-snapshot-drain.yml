# Drain accounting snapshot refresh queue on a short cadence.
# Preview/staging Vercel crons do not run; this workflow is the primary drain path.
# Secrets:
#   ACCOUNTING_SNAPSHOT_CRON_URL  — full URL to /api/internal/accounting-snapshots/process
#   ACCOUNTING_SNAPSHOT_CRON_SECRET — same value as CRON_SECRET on that deployment
name: Accounting Snapshot Drain

on:
  schedule:
    # Every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  drain-queue:
    name: Process snapshot refresh jobs
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call snapshot worker endpoint
        env:
          CRON_URL: ${{ secrets.ACCOUNTING_SNAPSHOT_CRON_URL }}
          CRON_SECRET: ${{ secrets.ACCOUNTING_SNAPSHOT_CRON_SECRET }}
        run: |
          if [ -z "$CRON_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing ACCOUNTING_SNAPSHOT_CRON_URL or ACCOUNTING_SNAPSHOT_CRON_SECRET"
            exit 1
          fi
          echo "Calling $CRON_URL ..."
          response=$(curl -s -w "\n%{http_code}" -X POST "${CRON_URL}?batch=25&batches=8" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP $http_code"
          echo "$body" | jq . 2>/dev/null || echo "$body"
          if [ "$http_code" != "200" ]; then
            echo "Expected 200, got $http_code"
            exit 1
          fi
